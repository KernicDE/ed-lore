<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#080a0f"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark rounded square background -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bg)" stroke="#1a2332" stroke-width="2"/>
  <!-- Orange star with glow -->
  <polygon points="64,18 74,46 104,46 80,64 88,92 64,74 40,92 48,64 24,46 54,46"
           fill="#ff8c00" filter="url(#glow)"/>
</svg>
