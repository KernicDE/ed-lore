name: Audio Generation

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Generate ALL missing audio files (not just 500 newest)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pyyaml edge-tts requests

      - name: Restore audio cache
        uses: actions/cache@v5
        with:
          path: website/public/audio
          key: audio-cache-${{ github.run_id }}
          restore-keys: audio-cache-

      - name: Restore manifest cache
        uses: actions/cache@v5
        with:
          path: scripts/audio_manifest.json
          key: manifest-cache-${{ github.run_id }}
          restore-keys: manifest-cache-

      - name: Generate audio
        run: |
          if [ "${{ github.event.inputs.full_rebuild }}" == "true" ]; then
            echo "Running FULL rebuild — all missing audio files..."
            python3 scripts/generate_audio.py --batch-size 0 --concurrency 8
          else
            echo "Running timed batch — generate as many missing files as possible in ~55 min..."
            python3 scripts/generate_audio.py --batch-size 0 --max-runtime 3300 --concurrency 8
          fi

      - name: Sync audio to R2
        run: python3 scripts/sync_audio_to_r2.py
        env:
          CLOUDFLARE_R2_TOKEN: ${{ secrets.CLOUDFLARE_R2_TOKEN }}

      - name: Remove MP3s from build (they are served from R2)
        run: |
          mkdir -p /tmp/audio-staging
          mv website/public/audio/*.mp3 /tmp/audio-staging/ || true

      - name: Generate lore_graph.json
        run: python3 scripts/build_graph.py

      - name: Install Node dependencies
        run: |
          cd website
          pnpm install

      - name: Copy data
        run: |
          mkdir -p website/src/data
          cp lore_graph.json website/src/data/

      - name: Build website
        run: |
          cd website
          pnpm build

      - name: Restore MP3s for cache
        run: |
          mv /tmp/audio-staging/*.mp3 website/public/audio/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

      - name: Commit manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add scripts/audio_manifest.json
          git diff --cached --quiet || git commit -m "Update audio manifest [skip ci]"
          git push origin main || true

      - name: Save audio cache
        uses: actions/cache@v5
        with:
          path: website/public/audio
          key: audio-cache-${{ github.run_id }}

      - name: Save manifest cache
        uses: actions/cache@v5
        with:
          path: scripts/audio_manifest.json
          key: manifest-cache-${{ github.run_id }}

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
