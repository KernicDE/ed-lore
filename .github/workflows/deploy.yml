name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pyyaml

      - name: Restore audio cache
        uses: actions/cache@v5
        with:
          path: website/public/audio
          key: audio-cache-${{ github.run_id }}
          restore-keys: audio-cache-

      - name: Restore manifest cache
        uses: actions/cache@v5
        with:
          path: scripts/audio_manifest.json
          key: manifest-cache-${{ github.run_id }}
          restore-keys: manifest-cache-

      - name: Generate lore_graph.json
        run: python3 scripts/build_graph.py

      - name: Install Node dependencies
        run: |
          cd website
          pnpm install

      - name: Copy data
        run: |
          mkdir -p website/src/data
          cp lore_graph.json website/src/data/

      - name: Build website
        run: |
          cd website
          pnpm build

      - name: Validate audio files
        run: |
          echo "=== Audio Validation ==="
          ARTICLE_COUNT=$(python3 -c "import json; print(json.load(open('website/public/data/version.json'))['article_count'])")
          MANIFEST_COUNT=$(python3 -c "import json,os; p='scripts/audio_manifest.json'; print(len(json.load(open(p))) if os.path.exists(p) else 0)")
          MP3_COUNT=$(find website/public/audio -maxdepth 1 -name '*.mp3' | wc -l)
          EMPTY_MP3S=$(find website/public/audio -maxdepth 1 -name '*.mp3' -size -2k | wc -l)

          echo "Articles in version.json:     $ARTICLE_COUNT"
          echo "Entries in audio_manifest:    $MANIFEST_COUNT"
          echo "MP3 files on disk:            $MP3_COUNT"
          echo "Empty/truncated MP3s (<2KB):  $EMPTY_MP3S"

          if [ "$MP3_COUNT" -eq "$ARTICLE_COUNT" ] && [ "$EMPTY_MP3S" -eq 0 ]; then
            echo "✅ Audio coverage complete — all $ARTICLE_COUNT articles have valid audio."
          else
            MISSING=$((ARTICLE_COUNT - MP3_COUNT))
            echo "⚠️  Audio incomplete — $MISSING articles missing audio, $EMPTY_MP3S empty/truncated files."
            echo "The hourly audio-generation workflow will fill the gaps automatically."
            echo "To force a full rebuild, run the 'Audio Generation' workflow manually with 'full_rebuild' checked."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
